<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深切缅怀 - 朱莉莉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #f5f3ee 0%, #faf9f6 50%, #f8f7f2 100%);
            color: #5a5a5a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ========== 顶部花束背景 ========== */
        .hero-section {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0;
            background: linear-gradient(180deg, rgba(245, 243, 238, 0.3) 0%, rgba(250, 249, 246, 0.7) 40%, #faf9f6 100%);
            overflow: hidden;
        }
        
        /* 实拍花束背景图 */
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background-image: url('https://s.coze.cn/image/LOLznq6_K7A/');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            filter: brightness(1.05) saturate(1.1);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,0.3) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,0.3) 85%, rgba(0,0,0,0) 100%);
        }
        
        /* 页面容器 */
        .page {
            min-height: auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* ========== 封面页 ========== */
        .cover-content {
            text-align: center;
            position: absolute;
            z-index: 10;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .cover-title {
            font-size: 41px;
            letter-spacing: 12px;
            color: #4a4a4a;
            font-weight: 600;
            margin-bottom: 12px;
            animation: fadeInDown 1.5s ease;
            text-shadow: 0 2px 20px rgba(74, 74, 74, 0.15);
        }
        
        .cover-name {
            font-size: 35px;
            letter-spacing: 8px;
            color: #4a4a4a;
            font-weight: 400;
            margin: 12px 0;
            position: relative;
            display: block;
            text-align: center;
        }
        
        .cover-name::before,
        .cover-name::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #9ab87a, transparent);
        }
        
        .cover-name::before {
            right: 100%;
            margin-right: 15px;
        }
        
        .cover-name::after {
            left: 100%;
            margin-left: 15px;
        }
        
        .cover-dates {
            font-size: 17px;
            letter-spacing: 4px;
            color: #8a8a8a;
            margin: 8px 0;
        }
        
        .cover-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #9ab87a, transparent);
            margin: 15px 0;
        }
        
        .cover-subtitle {
            font-size: 16px;
            letter-spacing: 3px;
            color: #7a7a7a;
            margin-top: 10px;
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #9a9a9a;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }
        
        .scroll-hint::after {
            content: '↓';
            display: block;
            text-align: center;
            margin-top: 8px;
            font-size: 18px;
        }
        
        /* ========== 人物简介 ========== */
        .profile-page {
            padding-top: 60px;
            padding-bottom: 60px;
        }
        
        .photo-frame {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 30px rgba(122, 155, 87, 0.15);
            margin-bottom: 25px;
            background: linear-gradient(135deg, #f5f3ee, #e8e5de);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .photo-frame:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(122, 155, 87, 0.25);
        }
        
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-name {
            font-size: 26px;
            letter-spacing: 5px;
            color: #4a4a4a;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .profile-dates {
            font-size: 14px;
            color: #8a8a8a;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }
        
        .profile-bio {
            max-width: 280px;
            text-align: center;
            line-height: 2;
            color: #6a6a6a;
            font-size: 14px;
        }
        
        /* ========== 相册 ========== */
        .gallery-page {
            background: linear-gradient(180deg, #f5f3ee 0%, #f8f7f2 100%);
        }
        
        .section-title {
            font-size: 20px;
            letter-spacing: 4px;
            color: #4a4a4a;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 600;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 360px;
            width: 100%;
        }
        
        .gallery-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #f5f5f5;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        
        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(122, 155, 87, 0.2);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .gallery-item img.loaded {
            opacity: 1;
        }
        
        .gallery-item.loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, #f5f5f5 0%, #e8e5de 50%, #f5f5f5 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        /* ========== 献花点烛 ========== */
        .tribute-page {
            background: linear-gradient(180deg, #f8f7f2 0%, #f5f3ee 100%);
        }
        
        .tribute-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .tribute-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .tribute-item:hover {
            transform: translateY(-5px);
        }
        
        .tribute-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 2px solid #e8e5de;
            transition: all 0.3s;
        }
        
        .tribute-item:hover .tribute-icon {
            border-color: #9ab87a;
            box-shadow: 0 8px 30px rgba(122, 155, 87, 0.2);
        }
        
        .tribute-count {
            margin-top: 12px;
            font-size: 13px;
            color: #8a8a8a;
        }
        
        /* 花瓣飘落动画 */
        .flower-particle {
            position: fixed;
            font-size: 24px;
            z-index: 9999;
            pointer-events: none;
            animation: fall 4s linear forwards;
        }
        
        @keyframes fall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* 蜡烛光效 */
        .candle-lit {
            animation: flicker 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes flicker {
            0% { filter: brightness(1) drop-shadow(0 0 10px rgba(255, 180, 100, 0.5)); }
            100% { filter: brightness(1.2) drop-shadow(0 0 25px rgba(255, 180, 100, 0.8)); }
        }
        
        /* ========== 留言页 ========== */
        .message-page {
            background: linear-gradient(180deg, #f5f3ee 0%, #f8f7f2 100%);
            min-height: auto;
            padding: 45px 20px;
        }
        
        .message-container {
            width: 100%;
            max-width: 360px;
        }
        
        .msg-input-area { width: 100%; }
        .msg-textarea { 
            width: 100%; 
            min-height: 100px; 
            padding: 15px; 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px solid #e8e5de; 
            border-radius: 4px; 
            color: #5a5a5a; 
            font-size: 14px; 
            outline: none; 
            resize: none; 
            line-height: 1.6; 
        }
        .msg-textarea:focus { border-color: #9ab87a; background: rgba(255, 255, 255, 1); }
        .msg-textarea::placeholder { color: #b8b8b8; }
        
        .img-upload-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .img-upload-btn { 
            width: 70px; 
            height: 70px; 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px dashed #d8d5ce; 
            border-radius: 4px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
        }
        .img-upload-btn:hover { border-color: #9ab87a; }
        .img-upload-btn input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .img-upload-btn .plus-icon { font-size: 24px; color: #b8b8b8; }
        .img-upload-btn .text { font-size: 10px; color: #b8b8b8; margin-top: 2px; }
        
        .img-preview-item { width: 70px; height: 70px; border-radius: 4px; position: relative; overflow: hidden; }
        .img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .img-preview-item .remove-btn { 
            position: absolute; 
            top: -5px; 
            right: -5px; 
            width: 20px; 
            height: 20px; 
            background: #e88a8a; 
            color: #fff; 
            border: none; 
            border-radius: 50%; 
            font-size: 14px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .send-row { display: flex; justify-content: flex-end; margin-top: 15px; }
        .send-btn { 
            padding: 10px 30px; 
            background: #9ab87a; 
            border: none; 
            border-radius: 4px; 
            color: #fff; 
            font-size: 14px; 
            cursor: pointer; 
        }
        .send-btn:hover { background: #7a9b57; }
        .send-btn:disabled { background: #d8d5ce; cursor: not-allowed; }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            color: #7a9b57;
            padding: 18px 30px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 2000;
            display: none;
            border: 1px solid #9ab87a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        /* 留言列表 */
        .messages-list {
            margin-top: 30px;
            width: 100%;
        }
        
        .message-item {
            background: rgba(255, 255, 255, 0.5);
            border-left: 2px solid #9ab87a;
            padding: 12px 15px;
            margin-bottom: 12px;
            border-radius: 0 4px 4px 0;
        }
        
        .message-item-name { color: #7a9b57; font-size: 13px; margin-bottom: 6px; }
        .message-item-content { color: #6a6a6a; font-size: 13px; line-height: 1.7; }
        .message-item-content img { max-width: 100%; border-radius: 4px; margin-top: 8px; }
        .message-item-time { color: #b8b8b8; font-size: 11px; margin-top: 8px; }
        
        /* ========== 页脚 ========== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #9a9a9a;
            font-size: 11px;
            letter-spacing: 2px;
            background: #f5f3ee;
            border-top: 1px solid #e8e5de;
        }
        
        /* ========== 动画 ========== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }
        
        /* 导航点 */
        .nav-dots {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #d8d5ce;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-dot:hover,
        .nav-dot.active {
            background: #9ab87a;
        }
        
        .nav-dot.active {
            transform: scale(1.3);
        }
    </style>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

                <div class="tribute-icon">🌸</div>
                <div class="tribute-count" id="flowerCount">已有 0 人献花</div>

            <div class="tribute-item" onclick="lightCandle()">
                <div class="tribute-icon" id="candleIcon">🕯️</div>

    <script>
        // ========== Supabase 初始化 ==========
        const SUPABASE_URL = 'https://hfrfezfxmrctrkmkjikj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_qxkCzLx_AMSVnyRjsiuLQg_n6uBfd8l';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ========== 匿名登录 ==========
        async function initAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                await supabase.auth.signInAnonymously();
            }
        }
        
        // ========== 加载数据 ==========
        async function loadTributes() {
            const { data, error } = await supabase
                .from('tributes')
                .select('*');
            
            if (data) {
                data.forEach(item => {
                    if (item.type === 'flower') {
                        document.getElementById('flowerCount').textContent = '已有 ' + item.count + ' 人献花';
                    } else if (item.type === 'candle') {
                        document.getElementById('candleCount').textContent = '已有 ' + item.count + ' 人点烛';
                    }
                });
            }
        }
        
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });
            
            const listEl = document.getElementById('messagesList');
            listEl.innerHTML = '';
            
            if (data) {
                data.forEach(function(msg) {
                    const div = document.createElement('div');
                    div.className = 'message-item';
                    
                    let content = msg.content || '';
                    if (msg.images && msg.images.length > 0) {
                        msg.images.forEach(imgUrl => {
                            content += '<br><img src="' + imgUrl + '" style="max-width:100%;border-radius:4px;margin-top:8px;">';
                        });
                    }
                    
                    const time = new Date(msg.created_at).toLocaleString('zh-CN');
                    
                    div.innerHTML = '<div class="message-item-name">匿名用户</div>' +
                        '<div class="message-item-content">' + content + '</div>' +
                        '<div class="message-item-time">' + time + '</div>';
                    listEl.appendChild(div);
                });
            }
        }
        
        // ========== 献花功能 ==========
        async function offerFlower() {
            const { data: current } = await supabase
                .from('tributes')
                .select('count')
                .eq('type', 'flower')
                .single();
            
            const newCount = (current?.count || 0) + 1;
            
            await supabase
                .from('tributes')
                .update({ count: newCount })
                .eq('type', 'flower');
            
            document.getElementById('flowerCount').textContent = '已有 ' + newCount + ' 人献花';
            
            const flowers = ['🌸', '🌺', '🌹', '🌷', '💐', '🌼'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower-particle';
                    flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                    flower.style.left = Math.random() * 100 + '%';
                    flower.style.top = '-50px';
                    document.body.appendChild(flower);
                    setTimeout(() => flower.remove(), 4000);
                }, i * 100);
            }
        }
        
        // ========== 点烛功能 ==========
        async function lightCandle() {
            const { data: current } = await supabase
                .from('tributes')
                .select('count')
                .eq('type', 'candle')
                .single();
            
            const newCount = (current?.count || 0) + 1;
            
            await supabase
                .from('tributes')
                .update({ count: newCount })
                .eq('type', 'candle');
            
            document.getElementById('candleCount').textContent = '已有 ' + newCount + ' 人点烛';
            
            const candleIcon = document.getElementById('candleIcon');
            candleIcon.classList.add('candle-lit');
            setTimeout(() => candleIcon.classList.remove('candle-lit'), 3000);
        }
        
        // ========== 图片上传 ==========
        let uploadedImages = [];
        const maxImages = 3;
        
        async function addImage(input) {
            if (uploadedImages.length >= maxImages) {
                showToast('最多只能上传3张图片');
                return;
            }
            
            const file = input.files[0];
            if (!file) return;
            
            const validTypes = ['image/jpeg', 'image/png', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showToast('请上传 jpg、png 或 gif 格式的图片');
                input.value = '';
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                showToast('图片大小不能超过 5MB');
                input.value = '';
                return;
            }
            
            const fileName = 'messages/' + Date.now() + '_' + Math.random().toString(36).substr(2, 9) + '.' + file.name.split('.').pop();
            
            const { data, error } = await supabase
                .storage
                .from('images')
                .upload(fileName, file);
            
            if (error) {
                showToast('图片上传失败，请重试');
                console.error(error);
                input.value = '';
                return;
            }
            
            const { data: urlData } = supabase
                .storage
                .from('images')
                .getPublicUrl(fileName);
            
            uploadedImages.push(urlData.publicUrl);
            renderImagePreviews();
            input.value = '';
        }
        
        function renderImagePreviews() {
            const row = document.getElementById('imgUploadRow');
            const uploadBtn = document.getElementById('uploadBtn');
            const previews = row.querySelectorAll('.img-preview-item');
            previews.forEach(p => p.remove());
            
            uploadedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'img-preview-item';
                div.innerHTML = '<img src="' + img + '" alt="预览"><button class="remove-btn" onclick="removeImage(' + index + ')">×</button>';
                row.insertBefore(div, uploadBtn);
            });
            
            uploadBtn.style.display = uploadedImages.length >= maxImages ? 'none' : 'flex';
        }
        
        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreviews();
        }
        
        // ========== 发送留言 ==========
        async function sendMessage() {
            const content = document.getElementById('msgContent').value.trim();
            
            if (!content && uploadedImages.length === 0) {
                showToast('请输入留言内容或上传图片');
                return;
            }
            
            const { data, error } = await supabase
                .from('messages')
                .insert([{
                    content: content,
                    images: uploadedImages.length > 0 ? uploadedImages : null
                }]);
            
            if (error) {
                showToast('留言发送失败，请重试');
                console.error(error);
                return;
            }
            
            document.getElementById('msgContent').value = '';
            uploadedImages = [];
            renderImagePreviews();
            
            await loadMessages();
            
            showToast('留言已发送，感谢您的追思');
        }
        
        // ========== 灯箱功能 ==========
        function openLightboxImg(element) {
            const img = element.querySelector('img');
            if (img) {
                document.getElementById('lightboxImg').src = img.src;
                document.getElementById('lightbox').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
        
        // ========== 提示框 ==========
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }
        
        // ========== 导航点功能 ==========
        const navDots = document.querySelectorAll('.nav-dot');
        const sections = document.querySelectorAll('section');
        
        navDots.forEach(dot => {
            dot.addEventListener('click', () => {
                const sectionIndex = dot.getAttribute('data-section');
                sections[sectionIndex].scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        // ========== 图片加载优化 ==========
        function initImageLoading() {
            const galleryItems = document.querySelectorAll('.gallery-item');
            const photoFrame = document.querySelector('.photo-frame');
            
            galleryItems.forEach(item => {
                const img = item.querySelector('img');
                if (img) {
                    item.classList.add('loading');
                    img.addEventListener('load', function() {
                        this.classList.add('loaded');
                        item.classList.remove('loading');
                    });
                    img.addEventListener('error', function() {
                        item.classList.remove('loading');
                        item.style.background = '#f5f5f5';
                        item.innerHTML = '<span style="color:#ccc;font-size:12px;">加载失败</span>';
                    });
                    if (img.complete) {
                        img.classList.add('loaded');
                        item.classList.remove('loading');
                    }
                }
            });
            
            if (photoFrame) {
                const img = photoFrame.querySelector('img');
                if (img) {
                    photoFrame.classList.add('loading');
                    img.addEventListener('load', function() {
                        this.classList.add('loaded');
                        photoFrame.classList.remove('loading');
                    });
                    if (img.complete) {
                        img.classList.add('loaded');
                        photoFrame.classList.remove('loading');
                    }
                }
            }
        }
        
        // ========== 滚动监听 ==========
        window.addEventListener('scroll', () => {
            let current = 0;
            sections.forEach((section, index) => {
                const rect = section.getBoundingClientRect();
                if (rect.top <= window.innerHeight / 2 && rect.bottom >= window.innerHeight / 2) {
                    current = index;
                }
            });
            navDots.forEach((dot, index) => {
                dot.classList.toggle('active', index === current);
            });
        });
        
        // ========== 页面初始化 ==========
        window.addEventListener('DOMContentLoaded', async () => {
            await initAuth();
            await loadTributes();
            await loadMessages();
            initImageLoading();
        });
    </script>
</body>
</html>
