<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深切缅怀 - 朱莉莉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #f5f3ee 0%, #faf9f6 50%, #f8f7f2 100%);
            color: #5a5a5a;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .hero-section {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(245, 243, 238, 0.3) 0%, rgba(250, 249, 246, 0.7) 40%, #faf9f6 100%);
            overflow: hidden;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background-image: url('./images/cover.jpg');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            filter: brightness(1.05) saturate(1.1);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,0.3) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,0.3) 85%, rgba(0,0,0,0) 100%);
        }
        
        .page {
            min-height: auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .cover-content {
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: -130px;
        }
        
        .cover-title {
            font-size: 38px;
            letter-spacing: 10px;
            color: #4a4a4a;
            font-weight: 600;
            margin-bottom: 15px;
            animation: fadeInDown 1.5s ease;
            text-shadow: 0 2px 20px rgba(74, 74, 74, 0.15);
        }
        
        .cover-name {
            font-size: 32px;
            letter-spacing: 6px;
            color: #4a4a4a;
            font-weight: 400;
            margin: 15px 0;
            position: relative;
            display: inline-block;
        }
        
        .cover-name::before,
        .cover-name::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #9ab87a, transparent);
        }
        
        .cover-name::before {
            right: 100%;
            margin-right: 20px;
        }
        
        .cover-name::after {
            left: 100%;
            margin-left: 20px;
        }
        
        .cover-dates {
            font-size: 14px;
            color: #8a8a8a;
            letter-spacing: 3px;
            margin-top: 20px;
        }
        
        .cover-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(180deg, #9ab87a, transparent);
            margin: 20px auto;
        }
        
        .cover-subtitle {
            font-size: 13px;
            color: #9a9a9a;
            letter-spacing: 6px;
            margin-bottom: 40px;
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #b8b8b8;
            font-size: 11px;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }
        
        .profile-page {
            background: linear-gradient(180deg, #faf9f6 0%, #f7f6f1 100%);
        }
        
        .photo-frame {
            width: 140px;
            height: 175px;
            background: linear-gradient(145deg, #ffffff, #f8f7f2);
            border: 2px solid #e8e5de;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .photo-frame:hover {
            border-color: #9ab87a;
        }
        
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .photo-frame img.loaded {
            opacity: 1;
        }
        
        .photo-frame.loading {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        .profile-name {
            font-size: 24px;
            color: #7a9b57;
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-weight: 400;
        }
        
        .profile-dates {
            font-size: 13px;
            color: #9a9a9a;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        .profile-bio {
            max-width: 300px;
            text-align: center;
            line-height: 2;
            font-size: 14px;
            color: #6a6a6a;
            padding: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 2px;
            border-left: 2px solid #9ab87a;
        }
        
        .gallery-page {
            background: #f7f6f1;
            min-height: auto;
            padding: 45px 20px;
        }
        
        .section-title {
            font-size: 18px;
            color: #7a9b57;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 6px;
            font-weight: 600;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 360px;
            width: 100%;
        }
        
        .gallery-item {
            aspect-ratio: 1;
            background: #ffffff;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .gallery-item img.loaded {
            opacity: 1;
        }
        
        .gallery-item.loading {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-content {
            max-width: 95%;
            max-height: 95%;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        
        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #7a9b57;
            font-size: 36px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 2001;
        }
        
        .lightbox-close:hover {
            opacity: 1;
        }
        
        .memorial-page {
            background: linear-gradient(180deg, #f7f6f1 0%, #f5f3ee 100%);
        }
        
        .memorial-actions {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .action-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 12px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e8e5de;
        }
        
        .action-btn:hover .action-icon {
            border-color: #9ab87a;
            box-shadow: 0 0 25px rgba(154, 184, 122, 0.25);
        }
        
        .action-text {
            font-size: 13px;
            color: #7a9b57;
            letter-spacing: 2px;
        }
        
        .counter {
            font-size: 10px;
            color: #9a9a9a;
            margin-top: 4px;
        }
        
        .flower-particle {
            position: fixed;
            font-size: 22px;
            pointer-events: none;
            animation: flowerFall 4s ease-out forwards;
            z-index: 1000;
            filter: sepia(20%);
        }
        
        @keyframes flowerFall {
            0% {
                opacity: 0.8;
                transform: translateY(-50px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }
        
        .candle-lit {
            animation: flicker 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes flicker {
            0% { filter: brightness(1) drop-shadow(0 0 10px rgba(255, 180, 100, 0.5)); }
            100% { filter: brightness(1.2) drop-shadow(0 0 25px rgba(255, 180, 100, 0.8)); }
        }
        
        .message-page {
            background: linear-gradient(180deg, #f5f3ee 0%, #f8f7f2 100%);
            min-height: auto;
            padding: 45px 20px;
        }
        
        .message-container {
            width: 100%;
            max-width: 360px;
        }
        
        .msg-input-area { width: 100%; }
        .msg-textarea { 
            width: 100%; 
            min-height: 100px; 
            padding: 15px; 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px solid #e8e5de; 
            border-radius: 4px; 
            color: #5a5a5a; 
            font-size: 14px; 
            outline: none; 
            resize: none; 
            line-height: 1.6; 
        }
        .msg-textarea:focus { border-color: #9ab87a; background: rgba(255, 255, 255, 1); }
        .msg-textarea::placeholder { color: #b8b8b8; }
        
        .img-upload-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .img-upload-btn { 
            width: 70px; 
            height: 70px; 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px dashed #d8d5ce; 
            border-radius: 4px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
        }
        .img-upload-btn:hover { border-color: #9ab87a; }
        .img-upload-btn input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .img-upload-btn .plus-icon { font-size: 24px; color: #b8b8b8; }
        .img-upload-btn .text { font-size: 10px; color: #b8b8b8; margin-top: 2px; }
        
        .img-preview-item { width: 70px; height: 70px; border-radius: 4px; position: relative; overflow: hidden; }
        .img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .img-preview-item .remove-btn { 
            position: absolute; 
            top: -5px; 
            right: -5px; 
            width: 20px; 
            height: 20px; 
            background: #e88a8a; 
            color: #fff; 
            border: none; 
            border-radius: 50%; 
            font-size: 14px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        
        .send-row { display: flex; justify-content: flex-end; margin-top: 15px; }
        .send-btn { 
            padding: 10px 30px; 
            background: #9ab87a; 
            border: none; 
            border-radius: 4px; 
            color: #fff; 
            font-size: 14px; 
            cursor: pointer; 
        }
        .send-btn:hover { background: #7a9b57; }
        .send-btn:disabled { background: #d8d5ce; cursor: not-allowed; }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            color: #7a9b57;
            padding: 18px 30px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 2000;
            display: none;
            border: 1px solid #9ab87a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #9a9a9a;
            font-size: 11px;
            letter-spacing: 2px;
            background: #f5f3ee;
            border-top: 1px solid #e8e5de;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-8px); }
            60% { transform: translateX(-50%) translateY(-4px); }
        }
        
        .nav-dots {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #d8d5ce;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-dot:hover,
        .nav-dot.active {
            background: #9ab87a;
        }
        
        .nav-dot.active {
            transform: scale(1.3);
        }
    </style>
</head>

    <script>
        /* ========== 配置区 ========== */
        const GITHUB_TOKEN = "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"; // 粘贴你生成的 Token  
cont GITHUB_TOKEN = “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”; 粘贴你生成的 Token
        const REPO_OWNER = "lelandmarc44-bit";           // 你的 GitHub 用户名
        const REPO_NAME = "memorial";                    // 你的仓库名
        /* ============================ */

        const GITHUB_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues`;

        // 页面状态变量
        let uploadedImages = [];
        const maxImages = 3;
        const navDots = document.querySelectorAll('.nav-dot');
        const sections = document.querySelectorAll('section');

        // ========== 页面加载初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化导航点
            initNavigation();
            
            // 加载统计数据
            loadStatistics();
            
            // 初始化图片懒加载
            initImageLoading();
            
            // 初始化字符计数
            const textarea = document.getElementById('msgContent');
            const charCount = document.getElementById('charCount');
            if (textarea && charCount) {
                charCount.textContent = textarea.value.length;
                textarea.addEventListener('input', function() {
                    charCount.textContent = this.value.length;
                });
            }
        });

        // ========== 核心功能函数 ==========

        // 1. 加载统计数据
        async function loadStatistics() {
            try {
                const response = await fetch(GITHUB_API, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) throw new Error('API 请求失败');
                const issues = await response.json();
                
                let flowerCount = 0;
                let candleCount = 0;
                
                issues.forEach(issue => {
                    if (issue.title === '💐 献花') flowerCount++;
                    if (issue.title === '🕯️ 点烛') candleCount++;
                });
                
                document.getElementById('flowerCount').textContent = `已有 ${flowerCount} 人献花`;
                document.getElementById('candleCount').textContent = `已有 ${candleCount} 人点烛`;
                
            } catch (e) {
                console.error('加载统计数据失败:', e);
                document.getElementById('flowerCount').textContent = '已有 0 人献花';
                document.getElementById('candleCount').textContent = '已有 0 人点烛';
            }
        }

        // 2. 献花功能
        async function offerFlower() {
            // 视觉效果
            const flowers = ['🌸', '🌺', '🌹', '🌷', '💐', '🌼'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower-particle';
                    flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                    flower.style.left = Math.random() * 100 + '%';
                    flower.style.top = '-50px';
                    document.body.appendChild(flower);
                    setTimeout(() => flower.remove(), 4000);
                }, i * 100);
            }
            
            // 保存数据
            try {
                const response = await fetch(GITHUB_API, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: '💐 献花',
                        body: `## 💐 献花纪念\n\n**时间**: ${new Date().toLocaleString()}\n**来自**: 纪念页面访客\n\n一束鲜花，寄托哀思。`,
                        labels: ['献花']
                    })
                });
                
                if (!response.ok) throw new Error('保存失败');
                showToast('献花已记录，感谢您的追思');
                await loadStatistics();
                
            } catch (e) {
                console.error('献花数据保存失败:', e);
                showToast('网络异常，请稍后重试');
            }
        }

        // 3. 点烛功能
        async function lightCandle() {
            // 视觉效果
            const candleIcon = document.getElementById('candleIcon');
            candleIcon.classList.add('candle-lit');
            setTimeout(() => candleIcon.classList.remove('candle-lit'), 3000);
            
            // 保存数据
            try {
                const response = await fetch(GITHUB_API, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: '🕯️ 点烛',
                        body: `## 🕯️ 点烛纪念\n\n**时间**: ${new Date().toLocaleString()}\n**来自**: 纪念页面访客\n\n一支蜡烛，照亮前行之路。`,
                        labels: ['点烛']
                    })
                });
                
                if (!response.ok) throw new Error('保存失败');
                showToast('蜡烛已点亮，感谢您的追思');
                await loadStatistics();
                
            } catch (e) {
                console.error('点烛数据保存失败:', e);
                showToast('网络异常，请稍后重试');
            }
        }

        // 4. 留言功能
        async function sendMessage() {
            const content = document.getElementById('msgContent').value.trim();
            
            if (!content && uploadedImages.length === 0) {
                showToast('请输入留言内容或上传图片');
                return;
            }
            
            if (content.length > 500) {
                showToast('留言内容不能超过500字');
                return;
            }
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.textContent = '发送中...';
            
            try {
                // 构建留言内容
                let messageBody = `## 💬 追思留言\n\n**时间**: ${new Date().toLocaleString()}\n\n`;
                messageBody += content;
                
                if (uploadedImages.length > 0) {
                    messageBody += '\n\n### 📷 上传的图片\n';
                    uploadedImages.forEach((img, index) => {
                        messageBody += `\n![图片${index + 1}](${img.data})`;
                    });
                }
                
                // 发送留言
                const response = await fetch(GITHUB_API, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: `💬 留言: ${content.substring(0, 30)}${content.length > 30 ? '...' : ''}`,
                        body: messageBody,
                        labels: ['留言']
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || '发送失败');
                }
                
                showToast('留言已永久保存，感谢您的追思');
                
                // 清空表单
                document.getElementById('msgContent').value = '';
                document.getElementById('charCount').textContent = '0';
                uploadedImages = [];
                renderImagePreviews();
                
            } catch (error) {
                console.error('发送失败:', error);
                showToast(error.message || '发送失败，请稍后重试');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }

        // 5. 图片上传处理
        function addImage(input) {
            if (uploadedImages.length >= maxImages) {
                showToast(`最多只能上传 ${maxImages} 张图片`);
                input.value = '';
                return;
            }
            
            const files = Array.from(input.files);
            const remainingSlots = maxImages - uploadedImages.length;
            const filesToAdd = files.slice(0, remainingSlots);
            
            filesToAdd.forEach(file => {
                const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
                if (!validTypes.includes(file.type)) {
                    showToast('请上传 jpg、png、gif 或 webp 格式的图片');
                    return;
                }
                
                if (file.size > 2 * 1024 * 1024) {
                    showToast('单张图片大小不能超过 2MB');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImages.push({
                        data: e.target.result,
                        name: file.name
                    });
                    renderImagePreviews();
                };
                reader.readAsDataURL(file);
            });
            
            input.value = '';
        }

        function renderImagePreviews() {
            const row = document.getElementById('imgUploadRow');
            const uploadBtn = document.getElementById('uploadBtn');
            
            // 清除现有预览
            row.querySelectorAll('.img-preview-item').forEach(p => p.remove());
            
            // 添加新预览
            uploadedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'img-preview-item';
                div.innerHTML = `
                    <img src="${img.data}" alt="预览">
                    <button class="remove-btn" onclick="removeImage(${index})">×</button>
                `;
                row.insertBefore(div, uploadBtn);
            });
            
            // 控制上传按钮显示
            uploadBtn.style.display = uploadedImages.length >= maxImages ? 'none' : 'flex';
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreviews();
        }

        // ========== 辅助功能函数 ==========

        function initNavigation() {
            navDots.forEach(dot => {
                dot.addEventListener('click', () => {
                    const sectionIndex = dot.getAttribute('data-section');
                    sections[sectionIndex].scrollIntoView({ behavior: 'smooth' });
                });
            });
            
            window.addEventListener('scroll', () => {
                let current = 0;
                sections.forEach((section, index) => {
                    const rect = section.getBoundingClientRect();
                    if (rect.top <= window.innerHeight / 2 && rect.bottom >= window.innerHeight / 2) {
                        current = index;
                    }
                });
                
                navDots.forEach((dot, index) => {
                    dot.classList.toggle('active', index === current);
                });
            });
        }

        function initImageLoading() {
            document.querySelectorAll('.gallery-item img, .photo-frame img').forEach(img => {
                if (img.complete) {
                    img.classList.add('loaded');
                } else {
                    img.addEventListener('load', function() {
                        this.classList.add('loaded');
                    });
                    img.addEventListener('error', function() {
                        this.parentElement.classList.remove('loading');
                    });
                }
            });
        }

        function openLightboxImg(element) {
            const img = element.querySelector('img');
            if (img && img.src) {
                document.getElementById('lightboxImg').src = img.src;
                document.getElementById('lightbox').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2500);
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
