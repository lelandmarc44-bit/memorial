<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深切缅怀 - 朱莉莉女士</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #1a2634 0%, #2a3a4a 100%);
            color: #e8e8e8;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .hero-section {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(26, 38, 52, 0.4) 0%, rgba(26, 38, 52, 0.92) 60%, #1a2634 100%);
            overflow: hidden;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 65%;
            background-image: url('https://s.coze.cn/image/LOLznq6_K7A/');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            filter: brightness(0.85) saturate(0.95);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 50%, rgba(0,0,0,0.3) 80%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 50%, rgba(0,0,0,0.3) 80%, rgba(0,0,0,0) 100%);
        }
        
        .page {
            min-height: auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .cover-content {
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: 60px;
        }
        
        .cover-title {
            font-size: 38px;
            letter-spacing: 10px;
            color: #d4c4a8;
            font-weight: 600;
            margin-bottom: 15px;
            animation: fadeInDown 1.5s ease;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        
        .cover-name {
            font-size: 32px;
            letter-spacing: 6px;
            color: #fff;
            font-weight: 400;
            margin: 15px 0;
            position: relative;
            display: inline-block;
        }
        
        .cover-name::before,
        .cover-name::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b6b4a, transparent);
        }
        
        .cover-name::before {
            right: 100%;
            margin-right: 20px;
        }
        
        .cover-name::after {
            left: 100%;
            margin-left: 20px;
        }
        
        .cover-dates {
            font-size: 14px;
            color: #999;
            letter-spacing: 3px;
            margin-top: 20px;
        }
        
        .cover-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(180deg, #8b6b4a, transparent);
            margin: 20px auto;
        }
        
        .cover-subtitle {
            font-size: 13px;
            color: #666;
            letter-spacing: 6px;
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #555;
            font-size: 11px;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }
        
        .profile-page {
            background: linear-gradient(180deg, #2a3a4a 0%, #1e2d3a 100%);
        }
        
        .photo-frame {
            width: 140px;
            height: 175px;
            background: linear-gradient(145deg, #3a4a5a, #2a3a4a);
            border: 2px solid #4a5a6a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .photo-frame:hover {
            border-color: #8b6b4a;
        }
        
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-name {
            font-size: 24px;
            color: #d4c4a8;
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-weight: 400;
        }
        
        .profile-dates {
            font-size: 13px;
            color: #777;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        .profile-bio {
            max-width: 300px;
            text-align: center;
            line-height: 2;
            font-size: 14px;
            color: #aaa;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 2px;
            border-left: 2px solid #8b6b4a;
        }
        
        .gallery-page {
            background: #1e2d3a;
            min-height: auto;
            padding: 45px 20px;
        }
        
        .section-title {
            font-size: 18px;
            color: #d4c4a8;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 6px;
            font-weight: 300;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 360px;
            width: 100%;
        }
        
        .gallery-item {
            aspect-ratio: 1;
            background: #2a3a4a;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-content {
            max-width: 95%;
            max-height: 95%;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        
        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 2001;
        }
        
        .lightbox-close:hover {
            opacity: 1;
        }
        
        .memorial-page {
            background: #2a3a4a;
        }
        
        .memorial-actions {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .action-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 12px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #3a4a5a;
        }
        
        .action-btn:hover .action-icon {
            border-color: #8b6b4a;
            box-shadow: 0 0 25px rgba(139, 107, 74, 0.2);
        }
        
        .action-text {
            font-size: 13px;
            color: #888;
            letter-spacing: 2px;
        }
        
        .counter {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
        }
        
        .flower-particle {
            position: fixed;
            font-size: 22px;
            pointer-events: none;
            animation: flowerFall 4s ease-out forwards;
            z-index: 1000;
            filter: grayscale(40%) sepia(30%);
        }
        
        @keyframes flowerFall {
            0% {
                opacity: 0.8;
                transform: translateY(-50px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }
        
        .candle-lit {
            animation: flicker 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes flicker {
            0% { filter: brightness(1) drop-shadow(0 0 10px rgba(255, 180, 100, 0.5)); }
            100% { filter: brightness(1.2) drop-shadow(0 0 25px rgba(255, 180, 100, 0.8)); }
        }
        
        .message-page {
            background: linear-gradient(180deg, #2a3a4a 0%, #1a2634 100%);
            min-height: auto;
            padding: 45px 20px;
        }
        
        .message-container {
            width: 100%;
            max-width: 360px;
        }
        
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #4a5a6a;
            font-size: 11px;
            letter-spacing: 2px;
            background: #1a2634;
            border-top: 1px solid #2a3a4a;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-8px); }
            60% { transform: translateX(-50%) translateY(-4px); }
        }
        
        .nav-dots {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #3a4a5a;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-dot:hover,
        .nav-dot.active {
            background: #8b6b4a;
        }
        
        .nav-dot.active {
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div class="nav-dots">
        <div class="nav-dot active" data-section="0"></div>
        <div class="nav-dot" data-section="1"></div>
        <div class="nav-dot" data-section="2"></div>
        <div class="nav-dot" data-section="3"></div>
        <div class="nav-dot" data-section="4"></div>
    </div>
    
    <section class="hero-section" id="section0">
        <div class="cover-content">
            <h1 class="cover-title">深切缅怀</h1>
            <h2 class="cover-name">朱莉莉女士</h2>
            <p class="cover-dates">1975 — 2026</p>
            <div class="cover-line"></div>
            <p class="cover-subtitle">永远怀念</p>
        </div>
        <p class="scroll-hint">向下滑动</p>
    </section>
    
    <section class="page profile-page" id="section1">
        <div class="photo-frame" onclick="openLightboxImg(this)">
            <img src="photo 1.jpg" alt="纪念照片">
        </div>
        <h2 class="profile-name">朱莉莉女士</h2>
        <p class="profile-dates">1975年 — 2026年</p>
        <div class="profile-bio">
            一生勤勉，品德高尚。<br>
            敬业乐群，与人为善。<br>
            您的精神永远激励我们前行。
        </div>
    </section>
    
    <section class="page gallery-page" id="section2">
        <h2 class="section-title">回忆墙</h2>
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 2.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 3.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 4.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 5.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 6.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 7.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 8.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 9.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 10.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 11.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 12.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 13.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 14.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 15.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 16.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 17.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 18.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 19.jpg" alt="照片"></div>
        </div>
    </section>
    
    <section class="page memorial-page" id="section3">
        <h2 class="section-title">追思寄托</h2>
        <div class="memorial-actions">
            <div class="action-btn" onclick="offerFlower()">
                <div class="action-icon">💐</div>
                <span class="action-text">献花</span>
                <span class="counter" id="flowerCount">已有 0 人献花</span>
            </div>
            <div class="action-btn" onclick="lightCandle()">
                <div class="action-icon" id="candleIcon">🕯️</div>
                <span class="action-text">点烛</span>
                <span class="counter" id="candleCount">已有 0 人点烛</span>
            </div>
        </div>
    </section>
    
    <section class="page message-page" id="section4">
        <div class="message-container">
            <h2 class="section-title">留言•念想寄存处</h2>
            <livere-comment client-id="Bc6yjWNCdr8uIIdgfBw@"></livere-comment>
            <script type="module" src="https://www.livere.org/livere-widget.js"></script>
        </div>
    </section>
    
    <footer class="footer">
        <p>纪念我们的至爱 · 我们将永远怀念她</p>
    </footer>
    
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="">
    </div>

    <script>
        let flowerCount = 0;
        let candleCount = 0;
        
        const navDots = document.querySelectorAll('.nav-dot');
        const sections = document.querySelectorAll('section');
        
        navDots.forEach(dot => {
            dot.addEventListener('click', () => {
                const sectionIndex = dot.getAttribute('data-section');
                sections[sectionIndex].scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        window.addEventListener('scroll', () => {
            let current = 0;
            sections.forEach((section, index) => {
                const rect = section.getBoundingClientRect();
                if (rect.top <= window.innerHeight / 2 && rect.bottom >= window.innerHeight / 2) {
                    current = index;
                }
            });
            navDots.forEach((dot, index) => {
                dot.classList.toggle('active', index === current);
            });
        });
        
        function offerFlower() {
            flowerCount++;
            document.getElementById('flowerCount').textContent = '已有 ' + flowerCount + ' 人献花';
            const flowers = ['🌸', '🌺', '🌹', '🌷', '💐', '🌼'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower-particle';
                    flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                    flower.style.left = Math.random() * 100 + '%';
                    flower.style.top = '-50px';
                    document.body.appendChild(flower);
                    setTimeout(() => flower.remove(), 4000);
                }, i * 100);
            }
        }
        
        function lightCandle() {
            candleCount++;
            document.getElementById('candleCount').textContent = '已有 ' + candleCount + ' 人点烛';
            const candleIcon = document.getElementById('candleIcon');
            candleIcon.classList.add('candle-lit');
            setTimeout(() => candleIcon.classList.remove('candle-lit'), 3000);
        }
        
        function openLightboxImg(element) {
            const img = element.querySelector('img');
            if (img) {
                document.getElementById('lightboxImg').src = img.src;
                document.getElementById('lightbox').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
