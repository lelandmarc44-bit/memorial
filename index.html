<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深切缅怀 - 朱莉莉女士</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #1a2634 0%, #2a3a4a 100%);
            color: #e8e8e8;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .hero-section {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(26, 38, 52, 0.4) 0%, rgba(26, 38, 52, 0.92) 60%, #1a2634 100%);
            overflow: hidden;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 55%;
            background-image: url('https://s.coze.cn/image/LOLznq6_K7A/');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            filter: brightness(0.9) saturate(0.95);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 50%, rgba(0,0,0,0.4) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 50%, rgba(0,0,0,0.4) 85%, rgba(0,0,0,0) 100%);
        }
        
        .page {
            min-height: auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .cover-content {
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: -130px;
        }
        
        .cover-title {
            font-size: 38px;
            letter-spacing: 10px;
            color: #d4c4a8;
            font-weight: 600;
            margin-bottom: 15px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        
        .cover-name {
            font-size: 32px;
            letter-spacing: 6px;
            color: #fff;
            font-weight: 400;
            margin: 15px 0;
            position: relative;
            display: inline-block;
        }
        
        .cover-name::before, .cover-name::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b6b4a, transparent);
        }
        .cover-name::before { right: 100%; margin-right: 20px; }
        .cover-name::after { left: 100%; margin-left: 20px; }
        
        .cover-dates { font-size: 14px; color: #999; letter-spacing: 3px; margin-top: 20px; }
        .cover-line { width: 1px; height: 40px; background: linear-gradient(180deg, #8b6b4a, transparent); margin: 20px auto; }
        .cover-subtitle { font-size: 13px; color: #666; letter-spacing: 6px; }
        .scroll-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #555; font-size: 11px; letter-spacing: 2px; animation: bounce 2s infinite; }
        
        .profile-page { background: linear-gradient(180deg, #2a3a4a 0%, #1e2d3a 100%); }
        
        .photo-frame {
            width: 140px; height: 175px;
            background: linear-gradient(145deg, #3a4a5a, #2a3a4a);
            border: 2px solid #4a5a6a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            cursor: pointer;
        }
        .photo-frame:hover { border-color: #8b6b4a; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-name { font-size: 24px; color: #d4c4a8; letter-spacing: 5px; margin-bottom: 10px; font-weight: 400; }
        .profile-dates { font-size: 13px; color: #777; letter-spacing: 2px; margin-bottom: 15px; }
        .profile-bio { max-width: 300px; text-align: center; line-height: 2; font-size: 14px; color: #aaa; padding: 20px; background: rgba(255, 255, 255, 0.02); border-radius: 2px; border-left: 2px solid #8b6b4a; }
        
        .gallery-page { background: #1e2d3a; min-height: auto; padding: 45px 20px; }
        .section-title { font-size: 18px; color: #d4c4a8; text-align: center; margin-bottom: 25px; letter-spacing: 6px; font-weight: 300; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 360px; width: 100%; }
        .gallery-item { aspect-ratio: 1; background: #2a3a4a; border-radius: 2px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .gallery-item:hover { transform: scale(1.02); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .lightbox.active { display: flex; }
        .lightbox-content { max-width: 95%; max-height: 95%; border-radius: 4px; }
        .lightbox-close { position: absolute; top: 15px; right: 20px; color: #fff; font-size: 36px; cursor: pointer; opacity: 0.6; z-index: 2001; }
        
        .memorial-page { background: #2a3a4a; }
        .memorial-actions { display: flex; gap: 40px; margin-bottom: 15px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.3s; }
        .action-btn:active { transform: scale(0.95); }
        .action-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 12px; transition: all 0.3s; background: rgba(255, 255, 255, 0.03); border: 1px solid #3a4a5a; }
        .action-btn:hover .action-icon { border-color: #8b6b4a; box-shadow: 0 0 25px rgba(139, 107, 74, 0.2); }
        .action-text { font-size: 13px; color: #888; letter-spacing: 2px; }
        .counter { font-size: 10px; color: #555; margin-top: 4px; }
        
        .flower-particle { position: fixed; font-size: 22px; pointer-events: none; animation: flowerFall 4s ease-out forwards; z-index: 1000; filter: grayscale(40%) sepia(30%); }
        @keyframes flowerFall { 0% { opacity: 0.8; transform: translateY(-50px) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(720deg); } }
        
        .candle-lit { animation: flicker 0.5s ease-in-out infinite alternate; }
        @keyframes flicker { 0% { filter: brightness(1) drop-shadow(0 0 10px rgba(255, 180, 100, 0.5)); } 100% { filter: brightness(1.2) drop-shadow(0 0 25px rgba(255, 180, 100, 0.8)); } }
        
        .message-page { background: linear-gradient(180deg, #2a3a4a 0%, #1a2634 100%); min-height: auto; padding: 45px 20px; }
        .message-container { width: 100%; max-width: 360px; }
        
        .msg-input-area { width: 100%; }
        .msg-textarea { width: 100%; min-height: 100px; padding: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid #3a4a5a; border-radius: 4px; color: #ddd; font-size: 14px; outline: none; resize: none; line-height: 1.6; }
        .msg-textarea:focus { border-color: #8b6b4a; background: rgba(255, 255, 255, 0.05); }
        .msg-textarea::placeholder { color: #666; }
        
        .img-upload-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .img-upload-btn { width: 70px; height: 70px; background: rgba(255, 255, 255, 0.03); border: 1px dashed #3a4a5a; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .img-upload-btn:hover { border-color: #8b6b4a; }
        .img-upload-btn input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .img-upload-btn .plus-icon { font-size: 24px; color: #555; }
        .img-upload-btn .text { font-size: 10px; color: #555; margin-top: 2px; }
        
        .img-preview-item { width: 70px; height: 70px; border-radius: 4px; position: relative; overflow: hidden; }
        .img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .img-preview-item .remove-btn { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; background: #c44; color: #fff; border: none; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .send-row { display: flex; justify-content: flex-end; margin-top: 15px; }
        .send-btn { padding: 10px 30px; background: #8b6b4a; border: none; border-radius: 4px; color: #fff; font-size: 14px; cursor: pointer; }
        .send-btn:hover { background: #9b7b5a; }
        
        .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(26, 38, 52, 0.98); color: #d4c4a8; padding: 18px 30px; border-radius: 4px; font-size: 14px; z-index: 2000; display: none; border: 1px solid #3a4a5a; }
        
        .messages-list { margin-top: 30px; width: 100%; }
        .messages-list-title { font-size: 12px; color: #666; text-align: center; margin-bottom: 18px; letter-spacing: 3px; }
        
        .footer { text-align: center; padding: 30px 20px; color: #4a5a6a; font-size: 11px; letter-spacing: 2px; background: #1a2634; border-top: 1px solid #2a3a4a; }
        
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); } 40% { transform: translateX(-50%) translateY(-8px); } 60% { transform: translateX(-50%) translateY(-4px); } }
        
        .nav-dots { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: #3a4a5a; cursor: pointer; transition: all 0.3s; }
        .nav-dot:hover, .nav-dot.active { background: #8b6b4a; }
        .nav-dot.active { transform: scale(1.3); }
        
        /* 隐藏Twikoo输入区域 */
        #tcomment .tk-input, #tcomment .tk-row, #tcomment form, .tk-input-container, .tk-submit { display: none !important; }
        #tcomment .tk-comments { margin-top: 0; }
        #tcomment .tk-comment { background: rgba(255, 255, 255, 0.02); border-left: 2px solid #8b6b4a; padding: 12px 15px; margin-bottom: 12px; border-radius: 0 4px 4px 0; }
        #tcomment .tk-nick { color: #d4c4a8; font-size: 13px; }
        #tcomment .tk-content { color: #aaa; font-size: 13px; line-height: 1.7; }
        #tcomment .tk-time { color: #555; font-size: 11px; }
        #tcomment .tk-avatar, #tcomment .tk-extras { display: none !important; }
    </style>
</head>
<body>
    <div class="nav-dots">
        <div class="nav-dot active" data-section="0"></div>
        <div class="nav-dot" data-section="1"></div>
        <div class="nav-dot" data-section="2"></div>
        <div class="nav-dot" data-section="3"></div>
        <div class="nav-dot" data-section="4"></div>
    </div>
    
    <section class="hero-section" id="section0">
        <div class="cover-content">
            <h1 class="cover-title">深切缅怀</h1>
            <h2 class="cover-name">朱莉莉女士</h2>
            <p class="cover-dates">1975 — 2026</p>
            <div class="cover-line"></div>
            <p class="cover-subtitle">永远怀念</p>
        </div>
        <p class="scroll-hint">向下滑动</p>
    </section>
    
    <section class="page profile-page" id="section1">
        <div class="photo-frame" onclick="openLightboxImg(this)"><img src="photo 1.jpg" alt="纪念照片"></div>
        <h2 class="profile-name">朱莉莉女士</h2>
        <p class="profile-dates">1975年 — 2026年</p>
        <div class="profile-bio">一生勤勉，品德高尚。<br>敬业乐群，与人为善。<br>您的精神永远激励我们前行。</div>
    </section>
    
    <section class="page gallery-page" id="section2">
        <h2 class="section-title">回忆墙</h2>
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 2.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 3.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 4.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 5.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 6.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 7.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 8.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 9.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 10.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 11.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 12.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 13.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 14.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 15.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 16.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 17.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 18.jpg" alt="照片"></div>
            <div class="gallery-item" onclick="openLightboxImg(this)"><img src="photo 19.jpg" alt="照片"></div>
        </div>
    </section>
    
    <section class="page memorial-page" id="section3">
        <h2 class="section-title">追思寄托</h2>
        <div class="memorial-actions">
            <div class="action-btn" onclick="offerFlower()">
                <div class="action-icon">💐</div>
                <span class="action-text">献花</span>
                <span class="counter" id="flowerCount">已有 0 人献花</span>
            </div>
            <div class="action-btn" onclick="lightCandle()">
                <div class="action-icon" id="candleIcon">🕯️</div>
                <span class="action-text">点烛</span>
                <span class="counter" id="candleCount">已有 0 人点烛</span>
            </div>
        </div>
    </section>
    
    <section class="page message-page" id="section4">
        <div class="message-container">
            <h2 class="section-title">留言•念想寄存处</h2>
            
            <div class="msg-input-area">
                <textarea class="msg-textarea" id="msgContent" placeholder="写下您的思念与祝福..."></textarea>
                
                <div class="img-upload-row" id="imgUploadRow">
                    <div class="img-upload-btn" id="uploadBtn">
                        <input type="file" accept="image/*" onchange="addImage(this)">
                        <span class="plus-icon">+</span>
                        <span class="text">添加图片</span>
                    </div>
                </div>
                
                <div class="send-row">
                    <button class="send-btn" onclick="sendMessage()">发送</button>
                </div>
            </div>
            
            <div id="tcomment" style="margin-top: 30px;"></div>
            <script src="https://cdn.jsdelivr.net/npm/twikoo@1.7.7/dist/twikoo.min.js"></script>
            <script>
            twikoo.init({
              envId: 'https://twikoo-vercel-theta-nine.vercel.app',
              el: '#tcomment',
              lang: 'zh-CN'
            })
            </script>
        </div>
    </section>
    
    <footer class="footer">
        <p>纪念我们的至爱 · 我们将永远怀念她</p>
    </footer>
    
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="">
    </div>
    <div class="toast" id="toast"></div>

    <script>
        let flowerCount = 0, candleCount = 0;
        const navDots = document.querySelectorAll('.nav-dot');
        const sections = document.querySelectorAll('section');
        
        navDots.forEach(dot => {
            dot.addEventListener('click', () => {
                sections[dot.getAttribute('data-section')].scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        window.addEventListener('scroll', () => {
            let current = 0;
            sections.forEach((section, index) => {
                const rect = section.getBoundingClientRect();
                if (rect.top <= window.innerHeight / 2 && rect.bottom >= window.innerHeight / 2) current = index;
            });
            navDots.forEach((dot, index) => { dot.classList.toggle('active', index === current); });
        });
        
        function offerFlower() {
            flowerCount++;
            document.getElementById('flowerCount').textContent = '已有 ' + flowerCount + ' 人献花';
            const flowers = ['🌸', '🌺', '🌹', '🌷', '💐', '🌼'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower-particle';
                    flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                    flower.style.left = Math.random() * 100 + '%';
                    flower.style.top = '-50px';
                    document.body.appendChild(flower);
                    setTimeout(() => flower.remove(), 4000);
                }, i * 100);
            }
        }
        
        function lightCandle() {
            candleCount++;
            document.getElementById('candleCount').textContent = '已有 ' + candleCount + ' 人点烛';
            const candleIcon = document.getElementById('candleIcon');
            candleIcon.classList.add('candle-lit');
            setTimeout(() => candleIcon.classList.remove('candle-lit'), 3000);
        }
        
        function openLightboxImg(element) {
            const img = element.querySelector('img');
            if (img) {
                document.getElementById('lightboxImg').src = img.src;
                document.getElementById('lightbox').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });
        
        let uploadedImages = [];
        const maxImages = 3;
        
        function addImage(input) {
            if (uploadedImages.length >= maxImages) { showToast('最多只能上传3张图片'); return; }
            const file = input.files[0];
            if (!file) return;
            if (!['image/jpeg', 'image/png', 'image/gif'].includes(file.type)) { showToast('请上传 jpg、png 或 gif 格式的图片'); input.value = ''; return; }
            if (file.size > 5 * 1024 * 1024) { showToast('图片大小不能超过 5MB'); input.value = ''; return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedImages.push(e.target.result);
                renderImagePreviews();
                input.value = '';
            };
            reader.readAsDataURL(file);
        }
        
        function renderImagePreviews() {
            const row = document.getElementById('imgUploadRow');
            const uploadBtn = document.getElementById('uploadBtn');
            row.querySelectorAll('.img-preview-item').forEach(p => p.remove());
            uploadedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'img-preview-item';
                div.innerHTML = `<img src="${img}" alt="预览"><button class="remove-btn" onclick="removeImage(${index})">×</button>`;
                row.insertBefore(div, uploadBtn);
            });
            uploadBtn.style.display = uploadedImages.length >= maxImages ? 'none' : 'flex';
        }
        
        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreviews();
        }
        
        function sendMessage() {
            const content = document.getElementById('msgContent').value.trim();
            if (!content && uploadedImages.length === 0) { showToast('请输入留言内容或上传图片'); return; }
            showToast('留言已发送，感谢您的追思');
            document.getElementById('msgContent').value = '';
            uploadedImages = [];
            renderImagePreviews();
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }
    </script>
</body>
</html>
