<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>深切缅怀 - 朱莉莉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Serif SC', serif;
            background: linear-gradient(180deg, #1a2634 0%, #2a3a4a 100%);
            color: #e8e8e8;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* ========== 顶部花束背景 ========== */
        .hero-section {
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(26, 38, 52, 0.4) 0%, rgba(26, 38, 52, 0.92) 60%, #1a2634 100%);
            overflow: hidden;
        }
        
        /* 实拍花束背景图 */
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%;
            background-image: url('https://s.coze.cn/image/LOLznq6_K7A/');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            filter: brightness(0.9) saturate(0.95);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 50%, rgba(0,0,0,0.4) 85%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 50%, rgba(0,0,0,0.4) 85%, rgba(0,0,0,0) 100%);
        }
        
        /* 页面容器 */
        .page {
            min-height: auto;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* ========== 封面页 ========== */
        .cover-content {
            text-align: center;
            position: relative;
            z-index: 10;
            margin-top: -130px;
        }
        
        .cover-title {
            font-size: 38px;
            letter-spacing: 10px;
            color: #d4c4a8;
            font-weight: 600;
            margin-bottom: 15px;
            animation: fadeInDown 1.5s ease;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        
        .cover-name {
            font-size: 32px;
            letter-spacing: 6px;
            color: #fff;
            font-weight: 400;
            margin: 15px 0;
            position: relative;
            display: inline-block;
        }
        
        .cover-name::before,
        .cover-name::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b6b4a, transparent);
        }
        
        .cover-name::before {
            right: 100%;
            margin-right: 20px;
        }
        
        .cover-name::after {
            left: 100%;
            margin-left: 20px;
        }
        
        .cover-dates {
            font-size: 14px;
            color: #999;
            letter-spacing: 3px;
            margin-top: 20px;
        }
        
        .cover-line {
            width: 1px;
            height: 40px;
            background: linear-gradient(180deg, #8b6b4a, transparent);
            margin: 20px auto;
        }
        
        .cover-subtitle {
            font-size: 13px;
            color: #666;
            letter-spacing: 6px;
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #555;
            font-size: 11px;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }
        
        /* ========== 人物简介页 ========== */
        .profile-page {
            background: linear-gradient(180deg, #2a3a4a 0%, #1e2d3a 100%);
        }
        
        .photo-frame {
            width: 140px;
            height: 175px;
            background: linear-gradient(145deg, #3a4a5a, #2a3a4a);
            border: 2px solid #4a5a6a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .photo-frame:hover {
            border-color: #8b6b4a;
        }
        
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-name {
            font-size: 24px;
            color: #d4c4a8;
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-weight: 400;
        }
        
        .profile-dates {
            font-size: 13px;
            color: #777;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        .profile-bio {
            max-width: 300px;
            text-align: center;
            line-height: 2;
            font-size: 14px;
            color: #aaa;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 2px;
            border-left: 2px solid #8b6b4a;
        }
        
        /* ========== 相册页 ========== */
        .gallery-page {
            background: #1e2d3a;
            min-height: auto;
            padding: 45px 20px;
        }
        
        .section-title {
            font-size: 18px;
            color: #d4c4a8;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 6px;
            font-weight: 300;
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 360px;
            width: 100%;
        }
        
        .gallery-item {
            aspect-ratio: 1;
            background: #2a3a4a;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 灯箱效果 */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-content {
            max-width: 95%;
            max-height: 95%;
            border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        
        .lightbox-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 2001;
        }
        
        .lightbox-close:hover {
            opacity: 1;
        }
        
        /* ========== 讣告页 ========== */
        .obituary-page {
            background: linear-gradient(180deg, #2a3a4a 0%, #1e2d3a 100%);
        }
        
        .obituary-container {
            max-width: 340px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 2px;
            padding: 30px 25px;
            border-top: 2px solid #8b6b4a;
        }
        
        .obituary-title {
            font-size: 16px;
            color: #d4c4a8;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 6px;
            font-weight: 300;
        }
        
        .obituary-content {
            font-size: 14px;
            line-height: 2.2;
            color: #bbb;
            text-align: justify;
        }
        
        .obituary-content strong {
            color: #d4c4a8;
        }
        
        .obituary-signature {
            text-align: right;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
            line-height: 2;
        }
        
        /* ========== 悼念互动页 ========== */
        .memorial-page {
            background: #2a3a4a;
        }
        
        .memorial-actions {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
        }
        
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .action-btn:active {
            transform: scale(0.95);
        }
        
        .action-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 12px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #3a4a5a;
        }
        
        .action-btn:hover .action-icon {
            border-color: #8b6b4a;
            box-shadow: 0 0 25px rgba(139, 107, 74, 0.2);
        }
        
        .action-text {
            font-size: 13px;
            color: #888;
            letter-spacing: 2px;
        }
        
        .counter {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
        }
        
        /* 献花动画 */
        .flower-particle {
            position: fixed;
            font-size: 22px;
            pointer-events: none;
            animation: flowerFall 4s ease-out forwards;
            z-index: 1000;
            filter: grayscale(40%) sepia(30%);
        }
        
        @keyframes flowerFall {
            0% {
                opacity: 0.8;
                transform: translateY(-50px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }
        
        /* 点烛动画 */
        .candle-lit {
            animation: flicker 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes flicker {
            0% { filter: brightness(1) drop-shadow(0 0 10px rgba(255, 180, 100, 0.5)); }
            100% { filter: brightness(1.2) drop-shadow(0 0 25px rgba(255, 180, 100, 0.8)); }
        }
        
        /* ========== 留言页 ========== */
        .message-page {
            background: linear-gradient(180deg, #2a3a4a 0%, #1a2634 100%);
            min-height: auto;
            padding: 45px 20px;
        }
        
        .message-container {
            width: 100%;
            max-width: 360px;
        }
        
        /* 简洁留言输入框 */
        .msg-input-area {
            width: 100%;
        }
        
        .msg-textarea {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #3a4a5a;
            border-radius: 4px;
            color: #ddd;
            font-size: 14px;
            outline: none;
            resize: none;
            transition: all 0.3s;
            line-height: 1.6;
        }
        
        .msg-textarea:focus {
            border-color: #8b6b4a;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .msg-textarea::placeholder {
            color: #666;
        }
        
        /* 图片上传区 */
        .img-upload-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .img-upload-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed #3a4a5a;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .img-upload-btn:hover {
            border-color: #8b6b4a;
        }
        
        .img-upload-btn input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .img-upload-btn .plus-icon {
            font-size: 24px;
            color: #555;
        }
        
        .img-upload-btn .text {
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }
        
        .img-preview-item {
            width: 70px;
            height: 70px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        
        .img-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .img-preview-item .remove-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: #c44;
            color: #fff;
            border: none;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* 发送按钮 */
        .send-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }
        
        .send-btn {
            padding: 10px 30px;
            background: #8b6b4a;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .send-btn:hover {
            background: #9b7b5a;
        }
        
        /* 提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 38, 52, 0.98);
            color: #d4c4a8;
            padding: 18px 30px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 2000;
            display: none;
            border: 1px solid #3a4a5a;
        }
        
        /* ========== 留言展示区 ========== */
        .messages-list {
            margin-top: 30px;
            width: 100%;
        }
        
        .messages-list-title {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-bottom: 18px;
            letter-spacing: 3px;
        }
        
        .message-item {
            background: rgba(255, 255, 255, 0.02);
            border-left: 2px solid #8b6b4a;
            padding: 12px 15px;
            margin-bottom: 10px;
        }
        
        .message-item-name {
            font-size: 12px;
            color: #d4c4a8;
            margin-bottom: 6px;
        }
        
        .message-item-content {
            font-size: 12px;
            color: #999;
            line-height: 1.7;
        }
        
        .message-item-image {
            margin-top: 8px;
            max-width: 100%;
        }
        
        .message-item-image img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .message-item-time {
            font-size: 10px;
            color: #444;
            margin-top: 8px;
        }
        
        /* ========== 页脚 ========== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #4a5a6a;
            font-size: 11px;
            letter-spacing: 2px;
            background: #1a2634;
            border-top: 1px solid #2a3a4a;
        }
        
        /* ========== 动画 ========== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-8px); }
            60% { transform: translateX(-50%) translateY(-4px); }
        }
        
        /* 导航点 */
        .nav-dots {
            position: fixed;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        .nav-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #3a4a5a;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav-dot:hover,
        .nav-dot.active {
            background: #8b6b4a;
        }
        
        .nav-dot.active {
            transform: scale(1.3);
        }
        
        /* Twikoo样式：隐藏所有输入表单，只显示评论列表 - 兼容微信/Safari */
        /* 使用更通用的选择器，避免Safari兼容性问题 */
        #tcomment .tk-input,
        #tcomment .tk-input-container,
        #tcomment .tk-row,
        #tcomment .tk-meta-input,
        #tcomment form,
        #tcomment .tk-footer,
        #tcomment .tk-submit,
        #tcomment .tk-toolbar,
        #tcomment .tk-actions,
        #tcomment textarea,
        #tcomment input[type="text"],
        #tcomment input[type="email"],
        #tcomment input[type="url"],
        #tcomment .tk-meta,
        #tcomment .tk-user { display: none !important; }
        
        #tcomment .tk-comments { 
            margin-top: 20px !important; 
            display: block !important;
        }
        
        #tcomment .tk-comment { 
            background: rgba(255,255,255,0.02); 
            border-left: 2px solid #8b6b4a; 
            padding: 12px 15px; 
            margin-bottom: 12px; 
            border-radius: 0 4px 4px 0; 
        }
        
        #tcomment .tk-nick { 
            color: #d4c4a8; 
            font-size: 13px; 
        }
        
        #tcomment .tk-content { 
            color: #aaa; 
            font-size: 13px; 
            line-height: 1.7; 
        }
        
        #tcomment .tk-content img { 
            max-width: 100%; 
            border-radius: 4px; 
            margin-top: 8px; 
        }
        
        #tcomment .tk-time { 
            color: #555; 
            font-size: 11px; 
        }
        
        #tcomment .tk-avatar, 
        #tcomment .tk-extras { 
            display: none !important; 
        }
        
        /* 隐藏献花和点烛的特殊评论 */
        #tcomment .tk-comment[data-nick="[献花]"],
        #tcomment .tk-comment[data-nick="[点烛]"] {
            display: none !important;
        }
        
        /* 自定义留言输入 */
        .msg-input-area { width: 100%; }
        .msg-textarea { width: 100%; min-height: 100px; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid #3a4a5a; border-radius: 4px; color: #ddd; font-size: 14px; outline: none; resize: none; line-height: 1.6; }
        .msg-textarea:focus { border-color: #8b6b4a; }
        .msg-textarea::placeholder { color: #666; }
        
        .img-upload-row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .img-upload-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.03); border: 1px dashed #3a4a5a; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .img-upload-btn:hover { border-color: #8b6b4a; }
        .img-upload-btn input { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .img-upload-btn .plus-icon { font-size: 24px; color: #555; }
        .img-upload-btn .text { font-size: 10px; color: #555; margin-top: 2px; }
        
        .img-preview-item { width: 70px; height: 70px; border-radius: 4px; position: relative; overflow: hidden; }
        .img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .img-preview-item .remove-btn { position: absolute; top: -5px; right: -5px; width: 20px; height: 20px; background: #c44; color: #fff; border: none; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .send-row { display: flex; justify-content: flex-end; margin-top: 15px; }
        .send-btn { padding: 10px 30px; background: #8b6b4a; border: none; border-radius: 4px; color: #fff; font-size: 14px; cursor: pointer; }
        .send-btn:hover { background: #9b7b5a; }
        .send-btn:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <!-- 导航点 -->
    <div class="nav-dots">
        <div class="nav-dot active" data-section="0"></div>
        <div class="nav-dot" data-section="1"></div>
        <div class="nav-dot" data-section="2"></div>
        <div class="nav-dot" data-section="3"></div>
        <div class="nav-dot" data-section="4"></div>
    </div>
    
    <!-- 封面页 -->
    <section class="hero-section" id="section0">
        <div class="cover-content">
            <h1 class="cover-title">深切缅怀</h1>
            <h2 class="cover-name">朱莉莉女士</h2>
            <p class="cover-dates">1975 — 2026</p>
            <div class="cover-line"></div>
            <p class="cover-subtitle">永远怀念</p>
        </div>
        <p class="scroll-hint">向下滑动</p>
    </section>
    
    <!-- 人物简介页 -->
    <section class="page profile-page" id="section1">
        <div class="photo-frame" onclick="openLightboxImg(this)">
            <img src="photo 1.jpg" alt="纪念照片">
        </div>
        <h2 class="profile-name">朱莉莉女士</h2>
        <p class="profile-dates">1975年 — 2026年</p>
        <div class="profile-bio">
            一生勤勉，品德高尚。<br>
            敬业乐群，与人为善。<br>
            您的精神永远激励我们前行。
        </div>
    </section>
    
    <!-- 相册页 -->
    <section class="page gallery-page" id="section2">
        <h2 class="section-title">回忆墙</h2>
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightboxImg(this)">
                <img src="photo 2.jpg" alt="照片1">
            </div>
            <div class="gallery-item" onclick="openLightboxImg(this)">
                <img src="photo 3.jpg" alt="照片2">
            </div>
            <div class="gallery-item" onclick="openLightboxImg(this)">
                <img src="photo 4.jpg" alt="照片3">
            </div>
            <div class="gallery-item" onclick="openLightboxImg(this)">
                <img src="photo 5.jpg" alt="照片4">
            </div>
            <div class="gallery-item" onclick="openLightboxImg(this)">
                <img src="photo 6.jpg" alt="照片5">

    <!-- 悼念互动页 -->
    <section class="page memorial-page" id="section3">
        <h2 class="section-title">追思寄托</h2>
        <div class="memorial-actions">
            <div class="action-btn" onclick="offerFlower()">
                <div class="action-icon">💐</div>
                <span class="action-text">献花</span>
                <span class="counter" id="flowerCount">已有 0 人献花</span>
            </div>
            <div class="action-btn" onclick="lightCandle()">
                <div class="action-icon" id="candleIcon">🕯️</div>
                <span class="action-text">点烛</span>
                <span class="counter" id="candleCount">已有 0 人点烛</span>
            </div>
        </div>
    </section>
    
    <!-- 留言页 -->
    <section class="page message-page" id="section4">
        <div class="message-container">
            <h2 class="section-title">留言•念想寄存处</h2>
            
            <!-- 自定义留言输入 -->
            <div class="msg-input-area">
                <textarea class="msg-textarea" id="msgContent" placeholder="写下您的思念与祝福..."></textarea>
                
                <!-- 图片上传 -->
                <div class="img-upload-row" id="imgUploadRow">
                    <div class="img-upload-btn" id="uploadBtn">
                        <input type="file" accept="image/*" onchange="addImage(this)">
                        <span class="plus-icon">+</span>
                        <span class="text">添加图片</span>
                    </div>
                </div>
                
                <div class="send-row">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>
            
            <!-- Twikoo 评论列表 -->
            <div id="tcomment"></div>
            <p style="text-align: center; color: #666; font-size: 12px; margin-top: 15px;">可上传图片 · 可匿名留言</p>
            <script src="https://cdn.jsdelivr.net/npm/twikoo@1.7.7/dist/twikoo.min.js"></script>
            <script>
            // Twikoo初始化 - 兼容微信/Safari
            var twikooInstance = null;
            
            function initTwikoo() {
                twikoo.init({
                    envId: 'https://twikoo-vercel-theta-nine.vercel.app',
                    el: '#tcomment',
                    lang: 'zh-CN',
                    onCommentLoaded: function() {
                        // 隐藏Twikoo输入表单，兼容微信/Safari
                        hideTwikooInputForm();
                    }
                }).then(function(instance) {
                    twikooInstance = instance;
                    console.log('Twikoo初始化成功');
                }).catch(function(err) {
                    console.error('Twikoo初始化失败:', err);
                });
            }
            
            // 隐藏Twikoo输入表单的函数
            function hideTwikooInputForm() {
                var tcomment = document.getElementById('tcomment');
                if (!tcomment) return;
                
                // 隐藏所有输入相关元素
                var selectors = [
                    '.tk-input', '.tk-input-container', '.tk-row', '.tk-meta-input',
                    'form', '.tk-footer', '.tk-submit', '.tk-toolbar', '.tk-actions',
                    'textarea', 'input[type="text"]', 'input[type="email"]', 
                    'input[type="url"]', '.tk-meta', '.tk-user'
                ];
                
                selectors.forEach(function(sel) {
                    var elements = tcomment.querySelectorAll(sel);
                    elements.forEach(function(el) {
                        el.style.display = 'none';
                    });
                });
                
                // 隐藏献花和点烛的特殊评论
                var comments = tcomment.querySelectorAll('.tk-comment');
                comments.forEach(function(comment) {
                    var nickEl = comment.querySelector('.tk-nick');
                    if (nickEl) {
                        var nick = nickEl.textContent.trim();
                        if (nick === '[献花]' || nick === '[点烛]') {
                            comment.style.display = 'none';
                        }
                    }
                });
            }
            
            // 初始化
            initTwikoo();
            </script>
        </div>
    </section>
    
    <!-- 页脚 -->
    <footer class="footer">
        <p>纪念我们的至爱 · 我们将永远怀念她</p>
    </footer>
    
    <!-- 灯箱 -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightboxImg" src="" alt="">
    </div>
    
    <!-- 提示框 -->
    <div class="toast" id="toast">留言提交成功</div>

    <script>
        // 初始化计数
        let flowerCount = 0;
        let candleCount = 0;
        let currentImageData = null;
        
        // 从Twikoo加载献花和点烛统计数据
        async function loadStatistics() {
            try {
                const response = await fetch('https://twikoo-vercel-theta-nine.vercel.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event: 'COMMENT_GET',
                        url: window.location.pathname
                    })
                });
                
                const result = await response.json();
                console.log('获取统计数据:', result);
                
                if (result.data && result.data.length > 0) {
                    // 统计献花和点烛数量
                    result.data.forEach(function(comment) {
                        if (comment.nick === '[献花]') {
                            flowerCount++;
                        } else if (comment.nick === '[点烛]') {
                            candleCount++;
                        }
                    });
                    
                    // 更新UI显示
                    document.getElementById('flowerCount').textContent = '已有 ' + flowerCount + ' 人献花';
                    document.getElementById('candleCount').textContent = '已有 ' + candleCount + ' 人点烛';
                }
            } catch (e) {
                console.error('加载统计数据失败:', e);
                // 显示默认值
                document.getElementById('flowerCount').textContent = '已有 0 人献花';
                document.getElementById('candleCount').textContent = '已有 0 人点烛';
            }
        }
        
        // 页面加载时获取统计数据
        loadStatistics();
        
        // 导航点功能
        const navDots = document.querySelectorAll('.nav-dot');
        const sections = document.querySelectorAll('section');
        
        navDots.forEach(dot => {
            dot.addEventListener('click', () => {
                const sectionIndex = dot.getAttribute('data-section');
                sections[sectionIndex].scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        // 滚动监听
        window.addEventListener('scroll', () => {
            let current = 0;
            sections.forEach((section, index) => {
                const rect = section.getBoundingClientRect();
                if (rect.top <= window.innerHeight / 2 && rect.bottom >= window.innerHeight / 2) {
                    current = index;
                }
            });
            
            navDots.forEach((dot, index) => {
                dot.classList.toggle('active', index === current);
            });
        });
        
        // 献花功能 - 存入Twikoo数据库
        async function offerFlower() {
            // 立即更新UI
            flowerCount++;
            document.getElementById('flowerCount').textContent = '已有 ' + flowerCount + ' 人献花';
            
            // 播放花朵动画
            const flowers = ['🌸', '🌺', '🌹', '🌷', '💐', '🌼'];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower-particle';
                    flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
                    flower.style.left = Math.random() * 100 + '%';
                    flower.style.top = '-50px';
                    document.body.appendChild(flower);
                    
                    setTimeout(() => flower.remove(), 4000);
                }, i * 100);
            }
            
            // 提交到Twikoo数据库
            try {
                await fetch('https://twikoo-vercel-theta-nine.vercel.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event: 'COMMENT_SUBMIT',
                        comment: {
                            nick: '[献花]',
                            mail: '',
                            link: '',
                            url: window.location.pathname,
                            href: window.location.href,
                            content: '🌸 献上一束鲜花，寄托哀思'
                        }
                    })
                });
                console.log('献花数据已保存');
            } catch (e) {
                console.error('献花数据保存失败:', e);
            }
        }
        
        // 点烛功能 - 存入Twikoo数据库
        async function lightCandle() {
            // 立即更新UI
            candleCount++;
            document.getElementById('candleCount').textContent = '已有 ' + candleCount + ' 人点烛';
            
            // 播放蜡烛动画
            const candleIcon = document.getElementById('candleIcon');
            candleIcon.classList.add('candle-lit');
            
            setTimeout(() => {
                candleIcon.classList.remove('candle-lit');
            }, 3000);
            
            // 提交到Twikoo数据库
            try {
                await fetch('https://twikoo-vercel-theta-nine.vercel.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event: 'COMMENT_SUBMIT',
                        comment: {
                            nick: '[点烛]',
                            mail: '',
                            link: '',
                            url: window.location.pathname,
                            href: window.location.href,
                            content: '🕯️ 点亮一支蜡烛，照亮前行'
                        }
                    })
                });
                console.log('点烛数据已保存');
            } catch (e) {
                console.error('点烛数据保存失败:', e);
            }
        }
        
        // 灯箱功能 - 图片放大
        function openLightboxImg(element) {
            const img = element.querySelector('img');
            if (img) {
                document.getElementById('lightboxImg').src = img.src;
                document.getElementById('lightbox').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }
        
        // ESC键关闭灯箱
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });
        
        // 图片预览功能
        let uploadedImages = [];
        const maxImages = 3;
        
        function addImage(input) {
            if (uploadedImages.length >= maxImages) {
                showToast('最多只能上传3张图片');
                return;
            }
            
            const file = input.files[0];
            if (!file) return;
            
            // 验证文件类型
            const validTypes = ['image/jpeg', 'image/png', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showToast('请上传 jpg、png 或 gif 格式的图片');
                input.value = '';
                return;
            }
            
            // 验证文件大小（最大5MB）
            if (file.size > 5 * 1024 * 1024) {
                showToast('图片大小不能超过 5MB');
                input.value = '';
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                uploadedImages.push(imgData);
                renderImagePreviews();
                input.value = '';
            };
            reader.readAsDataURL(file);
        }
        
        function renderImagePreviews() {
            const row = document.getElementById('imgUploadRow');
            const uploadBtn = document.getElementById('uploadBtn');
            
            // 清除现有预览
            const previews = row.querySelectorAll('.img-preview-item');
            previews.forEach(p => p.remove());
            
            // 添加预览
            uploadedImages.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'img-preview-item';
                div.innerHTML = `
                    <img src="${img}" alt="预览">
                    <button class="remove-btn" onclick="removeImage(${index})">×</button>
                `;
                row.insertBefore(div, uploadBtn);
            });
            
            // 隐藏或显示上传按钮
            uploadBtn.style.display = uploadedImages.length >= maxImages ? 'none' : 'flex';
        }
        
        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderImagePreviews();
        }
        
        // 发送留言 - 优化版：提交后即时显示
        async function sendMessage() {
            const content = document.getElementById('msgContent').value.trim();
            
            if (!content && uploadedImages.length === 0) {
                showToast('请输入留言内容或上传图片');
                return;
            }
            
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.textContent = '发送中...';
            
            try {
                // 构建评论内容，图片转为markdown格式
                let fullContent = content;
                if (uploadedImages.length > 0) {
                    uploadedImages.forEach((img, i) => {
                        fullContent += `\n\n![图片${i+1}](${img})`;
                    });
                }
                
                // 直接调用Twikoo云函数API提交评论
                const response = await fetch('https://twikoo-vercel-theta-nine.vercel.app', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        event: 'COMMENT_SUBMIT',
                        comment: {
                            nick: '匿名用户',
                            mail: '',
                            link: '',
                            url: window.location.pathname,
                            href: window.location.href,
                            content: fullContent
                        }
                    })
                });
                
                const result = await response.json();
                console.log('Twikoo提交结果:', result);
                
                if (result.result || result.id) {
                    showToast('留言已发送，感谢您的追思');
                    document.getElementById('msgContent').value = '';
                    uploadedImages = [];
                    renderImagePreviews();
                    
                    // 即时刷新评论列表（不刷新整个页面）
                    setTimeout(function() {
                        // 重新初始化Twikoo以加载最新评论
                        var tcomment = document.getElementById('tcomment');
                        if (tcomment) {
                            tcomment.innerHTML = '';
                            initTwikoo();
                        }
                    }, 1000);
                } else {
                    showToast('发送失败，请稍后重试');
                    console.error('提交失败:', result);
                }
                
            } catch (error) {
                console.error('提交出错:', error);
                showToast('发送失败，请检查网络');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }
    </script>
